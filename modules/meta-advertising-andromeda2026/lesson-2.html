<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #060A13;
      --panel: #0F1626;
      --panel2: #111827;
      --line: #223047;
      --muted: #94A3B8;
      --text: #F8FAFC;
      --red: #E11D48;
      --cyan: #06B6D4;
      --green: #22C55E;
      --yellow: #FBBF24;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Plus Jakarta Sans", Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .topbar {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
      background: #090D16;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      letter-spacing: .08em;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border: 2px solid var(--text);
      border-radius: 8px;
      transform: rotate(45deg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-dot {
      width: 12px;
      height: 12px;
      background: var(--red);
      border-radius: 3px;
    }

    .brand-text span { color: var(--red); }

    .badge {
      border: 1px solid var(--line);
      background: #121A2B;
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 310px 1fr;
      min-height: calc(100vh - 72px);
    }

    .sidebar {
      background: #090D16;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 72px);
    }

    .sidebar-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .slide-list {
      padding: 12px;
      overflow-y: auto;
      flex: 1;
    }

    .slide-btn {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      padding: 10px;
      border-radius: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      text-align: left;
      cursor: pointer;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 12px;
    }

    .slide-btn:hover { background: #111827; color: var(--text); }

    .slide-btn.active {
      background: rgba(225, 29, 72, .12);
      border-color: rgba(225, 29, 72, .5);
      color: var(--text);
    }

    .slide-num {
      background: #1E293B;
      color: var(--muted);
      border-radius: 6px;
      padding: 3px 6px;
      font-family: monospace;
      font-size: 11px;
      flex: 0 0 auto;
    }

    .slide-btn.active .slide-num {
      background: var(--red);
      color: white;
    }

    .slide-title-mini {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main {
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .lesson-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .backlink {
      color: var(--muted);
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
    }

    .backlink:hover { color: var(--text); }

    .frame {
      width: min(1100px, 100%);
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      min-height: 620px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .slide-content {
      padding: 44px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      background: rgba(225, 29, 72, .10);
      border: 1px solid rgba(225, 29, 72, .35);
      color: var(--red);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    h1, h2, h3 {
      font-family: "Space Grotesk", sans-serif;
      margin: 0;
      line-height: 1.05;
    }

    .slide-heading {
      font-size: clamp(30px, 4.4vw, 58px);
      letter-spacing: -0.04em;
      max-width: 900px;
    }

    .slide-heading .red { color: var(--red); }

    .subtitle {
      color: var(--muted);
      font-size: 17px;
      max-width: 780px;
      line-height: 1.55;
    }

    .bm-box {
      border-left: 4px solid var(--cyan);
      background: rgba(6, 182, 212, .07);
      padding: 14px 16px;
      border-radius: 0 12px 12px 0;
      color: #D7E8F5;
      font-size: 14px;
      line-height: 1.55;
      margin-top: auto;
    }

    .bm-box strong {
      color: var(--cyan);
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      background: #111827;
      border-radius: 14px;
      padding: 16px;
    }

    .card h3 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .muted { color: var(--muted); }

    .item-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .item-list li {
      border: 1px solid rgba(148, 163, 184, .15);
      background: rgba(15, 23, 42, .65);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    .item-list small {
      display: block;
      color: var(--muted);
      margin-top: 3px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      overflow: hidden;
      border-radius: 12px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #0B1220;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    td { color: #D7DEE8; }

    .timeline {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .phase {
      border: 1px solid var(--line);
      background: #111827;
      border-radius: 14px;
      padding: 14px;
      font-size: 12px;
    }

    .phase b {
      color: var(--cyan);
      display: block;
      margin-bottom: 8px;
    }

    .footer {
      border-top: 1px solid var(--line);
      background: #090D16;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .navgroup {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .navbtn {
      background: #121A2B;
      border: 1px solid var(--line);
      color: var(--text);
      width: 42px;
      height: 42px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
      font-weight: 700;
    }

    .navbtn:hover { border-color: var(--red); }

    .progress-wrap {
      flex: 1;
      max-width: 440px;
      height: 6px;
      background: #1E293B;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 4%;
      background: var(--red);
      transition: width .15s linear;
    }

    .counter {
      color: var(--muted);
      font-family: monospace;
      font-weight: 800;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { min-height: auto; max-height: 260px; }
      .main { padding: 18px; }
      .frame { min-height: 620px; }
      .slide-content { padding: 26px; }
      .grid-2, .grid-3, .timeline { grid-template-columns: 1fr; }
      .badge { display: none; }
    }
  </style>
</head>

          <p class="subtitle">"${esc(d.bm_quote)}"</p>
          <div class="grid-3">${(d.points || []).map(p => `<div class="card"><h3>${esc(p.en)}</h3><p class="muted">${esc(p.bm)}</p></div>`).join('')}</div>
          <p class="subtitle">${esc(d.final_msg || '')}</p>
        `;
      }

      else {
        body = `<h2 class="slide-heading">${esc(slide.title)}</h2><pre>${esc(JSON.stringify(d, null, 2))}</pre>`;
      }

      return body;
    }

    function renderSlide() {
      const slide = slideMetadata[currentSlide - 1];
      slideContent.innerHTML = renderGeneric(slide);

      slideProgressBadge.textContent = `${currentSlide} / ${totalSlides}`;
      slideNumIndicator.textContent = `${String(currentSlide).padStart(2, '0')} // ${String(totalSlides).padStart(2, '0')}`;
      slideProgressBar.style.width = `${(currentSlide / totalSlides) * 100}%`;

      [...document.querySelectorAll('.slide-btn')].forEach((btn, idx) => {
        btn.classList.toggle('active', idx + 1 === currentSlide);
      });
    }

    function populateSidebar() {
      sidebarList.innerHTML = slideMetadata.map((s, idx) => `
        <button class="slide-btn ${idx === 0 ? 'active' : ''}" onclick="goToSlide(${idx + 1})">
          <span class="slide-num">${String(idx + 1).padStart(2, '0')}</span>
          <span class="slide-title-mini">${esc(s.title)}</span>
        </button>
      `).join('');
    }

    function goToSlide(n) {
      currentSlide = Math.max(1, Math.min(totalSlides, n));
      renderSlide();
    }

    function nextSlide() {
      goToSlide(currentSlide === totalSlides ? 1 : currentSlide + 1);
    }

    function prevSlide() {
      goToSlide(currentSlide === 1 ? totalSlides : currentSlide - 1);
    }

    document.getElementById('next-btn').addEventListener('click', nextSlide);
    document.getElementById('prev-btn').addEventListener('click', prevSlide);

    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      const frame = document.querySelector('.frame');
      if (!document.fullscreenElement) frame.requestFullscreen?.();
      else document.exitFullscreen?.();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === 'ArrowLeft') prevSlide();
    });

    populateSidebar();
    renderSlide();
  </script>
</body>
</html>
